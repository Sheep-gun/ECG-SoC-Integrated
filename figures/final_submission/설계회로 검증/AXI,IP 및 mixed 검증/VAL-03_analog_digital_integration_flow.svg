  <title
     id="title">아날로그–디지털 통합 검증 흐름</title>
  <desc
     id="desc">AFE–ADC XMODEL과 고정 Pure RTL 코어를 동일한 XMODEL 시뮬레이션 환경에 통합한다. 36개의 30분 ECG PWL에서 생성된 adc_signed[11:0]과 sample_valid를 중간 파일 없이 RTL로 직접 전달하고, 각 입력당 1,800,000표본, 30개 Snapshot과 최종 판정을 연속 수행한다. 직접 전달된 ADC 데이터의 SHA-256과 최종 클래스·네 Final Membrane을 기준값과 비교한다.</desc>
