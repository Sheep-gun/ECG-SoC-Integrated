<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<rect width="1200" height="675" fill="#f7f9fc"/>
<rect x="0" y="0" width="1200" height="92" fill="#102a43"/>
<text x="54" y="52" font-family="Arial, Noto Sans KR, sans-serif" font-size="30" font-weight="700" fill="white">AFE·ADC 회로 블록 재구성도</text>
<text x="54" y="78" font-family="Arial, Noto Sans KR, sans-serif" font-size="14" fill="#bcccdc">고정 MATLAB 파라미터와 SystemVerilog XMODEL 정본에서 재구성</text>
<rect x="25" y="125" width="160" height="135" rx="14" fill="#e7f5ff" stroke="#486581" stroke-width="2"/>
<text x="105.0" y="159" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">ECG 차동 입력</text>
<text x="105.0" y="189" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">양·음 전극</text>
<text x="105.0" y="214" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">공개 ECG 전압</text>
<rect x="215" y="115" width="165" height="155" rx="14" fill="#e6fcf5" stroke="#486581" stroke-width="2"/>
<text x="297.5" y="149" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">HPF</text>
<text x="297.5" y="179" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">양·음 경로</text>
<text x="297.5" y="204" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">10 MΩ · 33 nF</text>
<text x="297.5" y="229" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">fc=0.482 Hz</text>
<rect x="410" y="105" width="190" height="175" rx="14" fill="#e6fcf5" stroke="#486581" stroke-width="2"/>
<text x="505.0" y="139" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">3-op-amp IA</text>
<text x="505.0" y="169" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">Rfb=100 kΩ</text>
<text x="505.0" y="194" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">Rg=1 kΩ</text>
<text x="505.0" y="219" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">Av=1+2Rfb/Rg=201</text>
<text x="505.0" y="244" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">차동단 10 kΩ</text>
<rect x="630" y="95" width="210" height="195" rx="14" fill="#fff4e6" stroke="#486581" stroke-width="2"/>
<text x="735.0" y="129" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">Active Twin-T</text>
<text x="735.0" y="159" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">R=26.526 kΩ · C=100 nF</text>
<text x="735.0" y="184" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">R/2 · 2C</text>
<text x="735.0" y="209" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">buffer + k=0.95</text>
<text x="735.0" y="234" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">Q≈5 · 60 Hz</text>
<rect x="870" y="115" width="145" height="155" rx="14" fill="#fff9db" stroke="#486581" stroke-width="2"/>
<text x="942.5" y="149" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">LPF+buffer</text>
<text x="942.5" y="179" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">1 kΩ · 1.06 µF</text>
<text x="942.5" y="204" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">fc=150.1 Hz</text>
<text x="942.5" y="229" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">ADC 구동</text>
<rect x="1045" y="105" width="130" height="175" rx="14" fill="#e5dbff" stroke="#486581" stroke-width="2"/>
<text x="1110.0" y="139" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">12-bit ADC</text>
<text x="1110.0" y="169" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">±1.65 V</text>
<text x="1110.0" y="194" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">1 kSPS</text>
<text x="1110.0" y="219" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">offset-binary</text>
<line x1="185" y1="192" x2="215" y2="192" stroke="#486581" stroke-width="4"/>
<polygon points="215,192 201,184 201,200" fill="#486581"/>
<line x1="380" y1="192" x2="410" y2="192" stroke="#486581" stroke-width="4"/>
<polygon points="410,192 396,184 396,200" fill="#486581"/>
