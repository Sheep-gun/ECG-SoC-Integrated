<polygon points="630,192 616,184 616,200" fill="#486581"/>
<line x1="840" y1="192" x2="870" y2="192" stroke="#486581" stroke-width="4"/>
<polygon points="870,192 856,184 856,200" fill="#486581"/>
<line x1="1015" y1="192" x2="1045" y2="192" stroke="#486581" stroke-width="4"/>
<polygon points="1045,192 1031,184 1031,200" fill="#486581"/>
<rect x="135" y="365" width="290" height="130" rx="14" fill="#edf2ff" stroke="#486581" stroke-width="2"/>
<text x="280.0" y="399" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">ADC 코드 변환</text>
<text x="280.0" y="429" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">code=floor((V+1.65)/3.3×4095)</text>
<text x="280.0" y="454" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">signed=code−2048</text>
<rect x="455" y="365" width="290" height="130" rx="14" fill="#edf2ff" stroke="#486581" stroke-width="2"/>
<text x="600.0" y="399" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">Canonical stream</text>
<text x="600.0" y="429" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">signed 12-bit two&#x27;s-complement</text>
<text x="600.0" y="454" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">1 sample/line · 3-digit hex</text>
<rect x="775" y="365" width="290" height="130" rx="14" fill="#d3f9d8" stroke="#486581" stroke-width="2"/>
<text x="920.0" y="399" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">Digital RTL 인계</text>
<text x="920.0" y="429" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">SHA256 manifest</text>
<text x="920.0" y="454" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">Snapshot + Final Membrane</text>
<line x1="425" y1="430" x2="455" y2="430" stroke="#486581" stroke-width="4"/>
<polygon points="455,430 441,422 441,438" fill="#486581"/>
<line x1="745" y1="430" x2="775" y2="430" stroke="#486581" stroke-width="4"/>
<polygon points="775,430 761,422 761,438" fill="#486581"/>
<text x="600" y="565" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="17" font-weight="700" fill="#c92a2a">주의: 원본 LTspice schematic이 아니라 문서·파라미터·XMODEL RTL 기반 설명용 재구성도</text>
<rect x="40" y="625" width="1120" height="32" rx="8" fill="#e1e8f0"/>
<text x="600" y="647" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="13" font-weight="400" fill="#486581">Physical PCB, silicon 또는 post-layout 회로도를 뜻하지 않음</text>
</svg>
