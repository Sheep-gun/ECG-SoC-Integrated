<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<rect width="1200" height="675" fill="#f7f9fc"/>
<rect x="0" y="0" width="1200" height="92" fill="#102a43"/>
<text x="54" y="52" font-family="Arial, Noto Sans KR, sans-serif" font-size="30" font-weight="700" fill="white">Database–class confounding and claim boundary</text>
<text x="54" y="78" font-family="Arial, Noto Sans KR, sans-serif" font-size="14" fill="#bcccdc">record-wise split solves one risk, not every domain risk</text>
<rect x="65" y="150" width="300" height="300" rx="14" fill="#e6fcf5" stroke="#486581" stroke-width="2"/>
<text x="215.0" y="184" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">What is controlled</text>
<text x="215.0" y="214" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">source-record leakage</text>
<text x="215.0" y="239" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">same stream contract</text>
<text x="215.0" y="264" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">no filename/DB feature</text>
<text x="215.0" y="289" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">locked final-test</text>
<rect x="450" y="150" width="300" height="300" rx="14" fill="#fff4e6" stroke="#486581" stroke-width="2"/>
<text x="600.0" y="184" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">What remains</text>
<text x="600.0" y="214" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">DB ↔ class coupling</text>
<text x="600.0" y="239" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">acquisition/lead/noise</text>
<text x="600.0" y="264" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">domain signatures</text>
<text x="600.0" y="289" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">clinical generalization</text>
<rect x="835" y="150" width="300" height="300" rx="14" fill="#e7f5ff" stroke="#486581" stroke-width="2"/>
<text x="985.0" y="184" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">What still holds</text>
<text x="985.0" y="214" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">RTL correctness</text>
<text x="985.0" y="239" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">bit-exact equivalence</text>
<text x="985.0" y="264" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">IP packaging</text>
<text x="985.0" y="289" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">board replay/resources</text>
<rect x="40" y="625" width="1120" height="32" rx="8" fill="#e1e8f0"/>
<text x="600" y="647" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="13" font-weight="400" fill="#486581">Future: same-acquisition multi-class cohort or explicit cross-domain protocol</text>
</svg>
