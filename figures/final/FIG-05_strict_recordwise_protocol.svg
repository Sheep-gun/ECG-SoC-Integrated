<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
<rect width="1200" height="675" fill="#f7f9fc"/>
<rect x="0" y="0" width="1200" height="92" fill="#102a43"/>
<text x="54" y="52" font-family="Arial, Noto Sans KR, sans-serif" font-size="30" font-weight="700" fill="white">Strict source-record-wise evaluation</text>
<text x="54" y="78" font-family="Arial, Noto Sans KR, sans-serif" font-size="14" fill="#bcccdc">record leakage 방지와 database confounding은 서로 다른 문제</text>
<rect x="70" y="160" width="280" height="260" rx="14" fill="#e8f1fb" stroke="#486581" stroke-width="2"/>
<text x="210.0" y="194" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">Source records</text>
<text x="210.0" y="224" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">record_id is split unit</text>
<text x="210.0" y="249" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">all chunks stay together</text>
<rect x="460" y="130" width="220" height="120" rx="14" fill="#e6fcf5" stroke="#486581" stroke-width="2"/>
<text x="570.0" y="164" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">Train</text>
<text x="570.0" y="194" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">61 / 68</text>
<rect x="460" y="285" width="220" height="120" rx="14" fill="#fff9db" stroke="#486581" stroke-width="2"/>
<text x="570.0" y="319" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">Validation</text>
<text x="570.0" y="349" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">32 / 32</text>
<text x="570.0" y="374" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">selection only</text>
<rect x="800" y="210" width="300" height="170" rx="14" fill="#e7f5ff" stroke="#486581" stroke-width="2"/>
<text x="950.0" y="244" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="19" font-weight="700" fill="#102a43">Locked final-test</text>
<text x="950.0" y="274" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">29 / 36 chunks</text>
<text x="950.0" y="299" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">one evaluation</text>
<text x="950.0" y="324" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="15" font-weight="400" fill="#334e68">not used for selection</text>
<line x1="350" y1="290" x2="460" y2="190" stroke="#486581" stroke-width="4"/>
<polygon points="460,190 446,182 446,198" fill="#486581"/>
<line x1="350" y1="290" x2="460" y2="345" stroke="#486581" stroke-width="4"/>
<polygon points="460,345 446,337 446,353" fill="#486581"/>
<line x1="680" y1="345" x2="800" y2="295" stroke="#486581" stroke-width="4"/>
<polygon points="800,295 786,287 786,303" fill="#486581"/>
<rect x="40" y="625" width="1120" height="32" rx="8" fill="#e1e8f0"/>
<text x="600" y="647" text-anchor="middle" font-family="Arial, Noto Sans KR, sans-serif" font-size="13" font-weight="400" fill="#486581">Prevents direct record leakage; does not eliminate database-to-class confounding</text>
</svg>
