<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="650" viewBox="0 0 1700 650" role="img" aria-label="Differential ECG inputs pass through paired HPFs, merge at the instrumentation amplifier, and continue through notch, low-pass, ADC, and signed digital handoff with separate model-stress injection paths">
